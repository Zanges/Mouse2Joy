version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      nuget-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      nuget-security:
        applies-to: security-updates
        update-types:
          - patch
          - minor
          - major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      actions-all:
        patterns:
          - "*"
