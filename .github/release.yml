# Configures auto-generated release notes.
# Reference: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Features
      labels:
        - enhancement
        - feature
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Dependencies
      labels:
        - dependencies
    - title: Internal
      labels:
        - internal
        - refactor
        - chore
        - tests
        - ci
        - docs
    - title: Other Changes
      labels:
        - "*"
